name: Generate Icon Artifact

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    if: github.repository == 'harkbazeng/apple-color-emoji-ttc'

    steps:
      - name: Get Apple Color Emoji version
        id: font_version
        run: |
          FONT="/System/Library/Fonts/Apple Color Emoji.ttc"
          VERSION=$(mdls -raw -name kMDItemVersion "$FONT" 2>/dev/null || true)
          if [ -z "$VERSION" ] || [ "$VERSION" = "(null)" ]; then
            VERSION="unknown"
          fi
          VERSION=$(echo "$VERSION" | tr ' /:' '---')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create artifact
        uses: actions/upload-artifact@v4
        with:
          name: "Apple Color Emoji - ${{ steps.font_version.outputs.version }}.ttc"
          path: "/System/Library/Fonts/Apple Color Emoji.ttc"
