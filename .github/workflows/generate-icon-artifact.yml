name: Generate Icon Artifact

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    if: github.repository == 'harkbazeng/apple-color-emoji-ttc'

    steps:
      - name: Get Apple Color Emoji version
        id: font_version
        run: |
          python3 -m pip install fonttools
          
          VERSION=$(python3 <<'PY'
          from fontTools.ttLib import TTCollection
          ttc = TTCollection("/System/Library/Fonts/Apple Color Emoji.ttc")
          font = ttc.fonts[0]
          print(font["name"].getName(4, 3, 1).toUnicode())
          PY
          )
          
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create artifact
        uses: actions/upload-artifact@v4
        with:
          name: "Apple Color Emoji - ${{ steps.font_version.outputs.version }}"
          path: "/System/Library/Fonts/Apple Color Emoji.ttc"
